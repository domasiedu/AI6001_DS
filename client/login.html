<!DOCTYPE html>
<html>

<head>

  <title>Login - Chess Game</title>

  <link
    rel="stylesheet"
    href="/styles.css"
  >

</head>

<body>

<div class="auth-container">

  <h1>♟ Chess Login</h1>

  <form id="loginForm">

    <input
      type="email"
      id="email"
      placeholder="Email"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    >

    <button type="submit">

      Login

    </button>

  </form>

  <p>

    New player?

    <a href="/register">

      Create account

    </a>

  </p>

</div>

<script src="/auth.js"></script>

</body>

</html>
