<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Chess</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <div class="top-bar">
      <div id="ai-thinking" class="hidden">
        AI Thinking...
      </div>
      <div class="controls">
        <button id="restart-game-btn">Restart Game</button>
        <button id="undo-btn">Undo Move</button>
      </div>
    </div>

    <div class="main-layout">
      <div class="left-area">
        <div class="board-wrapper">
          <div id="game-over-banner" class="hidden"></div>
          <div id="board"></div>
          <div id="game-status"></div>
        </div>
      </div>

      <div class="right-panel side-panel">
        <div class="panel-section">
          <h3>White Captures</h3>
          <div id="white-captures"></div>
        </div>

        <div class="panel-section">
          <h3>Black Captures</h3>
          <div id="black-captures"></div>
        </div>

        <div class="panel-section">
          <h3>Material</h3>
          <div id="material-display"></div>
        </div>

        <div class="panel-section">
          <h3>Move History</h3>
          <ol id="move-history"></ol>
        </div>
      </div>
    </div>
  </div>

  <script src="js/board.js"></script>
</body>
</html>
