<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Chess</title>
  <link rel="stylesheet" href="css/play.css">
</head>
<body>
  <div class="app-container">
    <div class="top-controls">
      <div class="left-controls">
        <button id="restartBtn">Restart Game</button>
        <button id="undoBtn">Undo Move</button>
      </div>

      <div class="right-controls">
        <span id="userDisplay"></span>
        <button id="logoutBtn">
          Logout
        </button>
      </div>
    </div>

    <div id="gameBanner"
         class="game-banner hidden">
      ♟ Game Loaded
    </div>

    <div id="ai-thinking" class="hidden">
      AI Thinking...
    </div>

    <div class="main-layout">
      <div class="left-area">
        <div id="game-over-banner" class="hidden"></div>
        <div class="game-container">
          <div id="board" class="board"></div>
        </div>
        <div id="game-status"></div>
      </div>

      <div class="right-panel side-panel">
        <div class="panel-section">
          <h3>White Captures</h3>
          <div id="white-captures" class="capture-list"></div>
        </div>

        <div class="panel-section">
          <h3>Black Captures</h3>
          <div id="black-captures" class="capture-list"></div>
        </div>

        <div class="panel-section">
          <h3>Material</h3>
          <div id="material-display" class="material-section"></div>
        </div>

        <div class="panel-section">
          <h3>Move History</h3>
          <ol id="move-history"></ol>
        </div>
      </div>
    </div>
  </div>

  <div id="checkmateModal"
       class="modal hidden">
    <div class="modal-content">
      <h2 id="checkmateText">
        CHECKMATE
      </h2>

      <div class="modal-buttons">
        <button id="newGameBtn">
          New Game
        </button>

        <button id="closeModalBtn">
          Close
        </button>
      </div>
    </div>
  </div>

  <script>
    const token =
      localStorage.getItem("token");

    if (!token) {
      alert("Please login first");
      window.location = "/";
    }
  </script>
  <script src="/js/api.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
