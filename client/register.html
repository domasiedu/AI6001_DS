<!DOCTYPE html>
<html>

<head>

  <title>Register - Chess Game</title>

  <link
    rel="stylesheet"
    href="/styles.css"
  >

</head>

<body>

<div class="auth-container">

  <h1>♟ Join the Game</h1>

  <form id="registerForm">

    <input
      type="text"
      id="name"
      placeholder="Full Name"
      required
    >

    <input
      type="email"
      id="email"
      placeholder="Email"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    >

    <button type="submit">

      Register

    </button>

  </form>

  <p>

    Already registered?

    <a href="/">

      Login

    </a>

  </p>

</div>

<script src="/auth.js"></script>

</body>

</html>
