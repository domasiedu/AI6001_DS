version: "3.9"

services:

  mongo:
    image: mongo:7

    container_name: chess-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  server:
    build: .

    container_name: chess-server

    ports:
      - "3000:3000"

    depends_on:
      - mongo

    environment:
      - MONGO_URI=mongodb://mongo:27017/chessdb

volumes:
  mongo_data:
